<!DOCTYPE html>
<html>
<head>
<title>FitPulse Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/script.js" defer></script>

</head>

<body class="dashboard-body">

<div class="user-box" onclick="toggleMenu()">
  <div class="avatar" id="avatar"></div>
  <span id="userName"></span>

  <div class="dropdown" id="dropdownMenu">
    <p onclick="logout()">Logout</p>
  </div>
</div>

<div class="dashboard-layout">

<div class="sidebar">
<h2 class="logo">FitPulse</h2>
<a href="dashboard.html">Dashboard</a>
<a href="home.html">Log Activity</a>
<a href="index.html">Logout</a>
</div>

<div class="main-content">

<h1 class="page-title">Health Dashboard</h1>

<div class="metrics">

<div class="metric-card"><h3>Heart Rate</h3><p id="dHeart">--</p></div>
<div class="metric-card"><h3>Steps</h3><p id="dSteps">--</p></div>
<div class="metric-card"><h3>Sleep</h3><p id="dSleep">--</p></div>
<div class="metric-card"><h3>Avg Heart Rate</h3><p id="avgHeart">--</p></div>
<div class="metric-card"><h3>Avg Steps</h3><p id="avgSteps">--</p></div>
<div class="metric-card"><h3>Avg Sleep</h3><p id="avgSleep">--</p></div>

</div>

<div id="alertBox"></div>

<div class="chart-container">

  <div class="chart-box">
    <h3>Heart Rate Trend</h3>
    <canvas id="heartRateChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>Steps Trend</h3>
    <canvas id="stepsChart"></canvas>
  </div>

  <div class="chart-box">
    <h3>Sleep Trend</h3>
    <canvas id="sleepChart"></canvas>
  </div>

</div>

<div class="dashboard-buttons">

<button onclick="downloadCSV()">Download CSV</button>
<button onclick="showClearOptions()">Clear Data</button>

</div>

<!-- OPTIONS -->
<div id="clearOptions" style="display:none; margin-top:15px;">

  <button onclick="clearAllData()">
    <i class="fas fa-trash"></i> Clear All Data
  </button>

  <button onclick="enableSelection()">
    <i class="fas fa-check-circle"></i> Clear Selective Data
  </button>

</div>

<button id="deleteSelectedBtn" onclick="deleteSelected()" style="display:none;">
  <i class="fas fa-trash-alt"></i> Delete Selected
</button>

<h3>Health Records</h3>

<table class="data-table">

<thead>
<tr>
<th class="select-col" style="display:none;">Select</th>
<th>Timestamp</th>
<th>Heart Rate</th>
<th>Steps</th>
<th>Sleep</th>
</tr>
</thead>

<tbody id="dataTable"></tbody>

</table>

</div>
</div>

<!-- CUSTOM MODAL -->
<div id="customModal" class="modal">
  <div class="modal-box">
    <p id="modalText">Are you sure?</p>

    <div class="modal-buttons">
      <button class="confirm-btn" onclick="confirmAction()">Yes</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

</body>
</html>
