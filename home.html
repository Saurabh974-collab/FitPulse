<!DOCTYPE html>
<html>
<head>

<title>FitPulse - Log Activity</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>

</head>

<body class="app-body">

<div class="user-box" onclick="toggleMenu()">
  <div class="avatar" id="avatar"></div>
  <span id="userName"></span>

  <div class="dropdown" id="dropdownMenu">
    <p onclick="logout()">Logout</p>
  </div>
</div>


<div class="app-layout">
<div class="sidebar">
<div class="logo">FitPulse</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a class="active" href="home.html">Log Activity</a>
<a href="index.html">Logout</a>
</div>
</div>

<div class="main-panel">

<h1>Log Health Activity</h1>

<div class="panel-card">

<h3>Activity</h3>

<label>Heart Rate</label>
<input type="range" min="0" max="200" value="0"
id="heartRate"
oninput="hrValue.innerText=this.value; updateHealthStatus()">

<div class="value-text">
<span id="hrValue">0</span> BPM
</div>


<label>Steps</label>
<input type="range" min="0" max="20000" value="0"
id="steps"
oninput="stepsValue.innerText=this.value; updateHealthStatus()">

<div class="value-text">
<span id="stepsValue">0</span>
</div>

<label>Sleep</label>
<input type="range" min="0" max="12" step="0.1" value="0"
id="sleep"
oninput="sleepValue.innerText=this.value; updateHealthStatus()">

<div class="value-text">
<span id="sleepValue">0</span> Hours
</div>


<h3>Timestamp</h3>

<input type="datetime-local" id="timestamp">


<div id="healthStatus" class="status-card">
✓ Health Status: 
</div>


<button class="save-button" onclick="saveHealthData(event)">
Save Health Entry
</button>

</div>

</div>

</div>

<script>
// Reset form on page load
document.addEventListener("DOMContentLoaded", function () {
  document.body.offsetHeight; // Force reflow
});

// Reset when user navigates back to home
window.addEventListener("pageshow", function(event) {
  if (event.persisted) {
    // Page was restored from back/forward cache
    location.reload();
  }
});
</script>

</body>
</html>
